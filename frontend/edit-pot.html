<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑花盆 - My Flower Pots</title>

    <!-- Vue 3 CDN -->
    <script src="js/vue.global.js"></script>

    <style>
        [v-cloak] {
            display: none !important;
        }
    </style>

    <!-- Tailwind CSS & Custom Styles (Optimized) -->
    <link rel="stylesheet" href="css/tailwind-built.css?v=20260227">
    <link rel="stylesheet" href="css/app.css?v=20260227">

    <!-- 图标库 -->
    <link rel="stylesheet" href="css/icons.css">

    <!-- 配置脚本 -->
    <script src="js/config.js?v=20260111"></script>
    <script src="js/api-client.js?v=20260111"></script>
</head>

<body class="bg-gray-50">
    <div id="app" v-cloak>
        <!-- 顶部导航栏 (全宽强制布局) -->
        <header class="header bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-50 h-16 w-full">
            <div class="container relative flex items-center h-full">
                <div class="z-10">
                    <button class="w-10 h-10 flex items-center justify-center text-gray-400 active:scale-90 transition"
                        @click="goBack">
                        <i class="fa fa-arrow-left text-xl"></i>
                    </button>
                </div>
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <h1 class="text-base sm:text-lg font-black text-gray-800">编辑资料</h1>
                </div>
            </div>
        </header>

        <!-- 主内容区域 -->
        <main class="container py-8">
            <!-- 加载状态 -->
            <div v-if="isLoading" class="loading py-20">
                <div class="spinner"></div>
                <p>正在读取花盆信息...</p>
            </div>

            <div v-else-if="loadError" class="bg-white rounded-[2rem] shadow-sm p-8 text-center">
                <div class="w-14 h-14 mx-auto mb-4 rounded-2xl bg-red-50 text-red-500 flex items-center justify-center">
                    <i class="fa fa-exclamation-triangle text-xl"></i>
                </div>
                <h3 class="text-base font-black text-gray-800 mb-2">读取花盆信息失败</h3>
                <p class="text-sm text-gray-500 mb-6">{{ loadError }}</p>
                <div class="space-y-3">
                    <button type="button" @click="retryInit"
                        class="w-full bg-green-500 text-white py-4 rounded-2xl text-sm font-black shadow-lg shadow-green-100 hover:bg-green-600 transition active:scale-95">
                        重试加载
                    </button>
                    <button type="button" @click="goBack" class="w-full py-3 text-gray-400 font-bold text-sm">
                        返回详情页
                    </button>
                </div>
            </div>

            <div v-else class="bg-white rounded-[2rem] shadow-sm p-8">
                <form @submit.prevent="updatePot" class="space-y-6">
                    <!-- 1. 图片修改 -->
                    <div class="flex flex-col items-center">
                        <div class="relative w-40 h-40 group">
                            <div
                                class="w-full h-full rounded-3xl bg-gray-50 border-2 border-dashed border-gray-200 overflow-hidden flex items-center justify-center transition group-hover:border-green-500">
                                <img v-if="imagePreview" :src="imagePreview" class="w-full h-full object-cover">
                                <div v-else class="text-center text-gray-400">
                                    <i class="fa fa-camera text-3xl mb-2"></i>
                                    <p class="text-[10px] font-bold uppercase tracking-wider">上传照片</p>
                                </div>
                            </div>
                            <!-- 悬浮编辑图标 -->
                            <div
                                class="absolute -bottom-2 -right-2 bg-green-500 text-white w-10 h-10 rounded-2xl flex items-center justify-center shadow-lg border-4 border-white cursor-pointer hover:scale-110 transition active:scale-95">
                                <i class="fa fa-camera"></i>
                            </div>
                            <input type="file" @change="onFileSelected" accept="image/*"
                                class="absolute inset-0 opacity-0 cursor-pointer">
                        </div>
                        <p class="text-xs text-gray-400 mt-4">点击图片可更换照片</p>
                    </div>

                    <!-- 2. 花盆名称 -->
                    <div class="relative">
                        <label
                            class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">花盆名称</label>
                        <div class="relative">
                            <input type="text" v-model="form.name" @input="onNameInput" required placeholder="请输入名称"
                                class="w-full bg-gray-50 border-none rounded-2xl py-4 px-6 focus:ring-2 focus:ring-green-500 transition-all font-bold text-gray-800">
                            <div v-if="suggestions.length > 0"
                                class="absolute left-0 right-0 mt-2 bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden z-30">
                                <button v-for="s in suggestions" :key="s" type="button" @click="selectSuggestion(s)"
                                    class="w-full text-left px-6 py-3 text-sm hover:bg-green-50 border-b border-gray-50 last:border-none transition">
                                    {{ s }}
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 3. 种植日期 -->
                    <div>
                        <label
                            class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">种植日期</label>
                        <input type="date" v-model="form.plant_date" required
                            class="w-full bg-gray-50 border-none rounded-2xl py-4 px-6 focus:ring-2 focus:ring-green-500 transition-all font-bold text-gray-800">
                    </div>

                    <!-- 4. 备注 -->
                    <div>
                        <label
                            class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">备注说明</label>
                        <textarea v-model="form.note" rows="3" placeholder="添加一些备注..."
                            class="w-full bg-gray-50 border-none rounded-2xl py-4 px-6 focus:ring-2 focus:ring-green-500 transition-all font-bold text-gray-800 resize-none"></textarea>
                    </div>

                    <!-- 提交按钮 -->
                    <div class="pt-4">
                        <button type="submit" :disabled="isSaving"
                            class="w-full bg-green-500 text-white py-5 rounded-[1.5rem] text-lg font-black shadow-xl shadow-green-100 hover:bg-green-600 disabled:opacity-50 transition-all active:scale-[0.98]">
                            <span v-if="!isSaving">保存修改</span>
                            <span v-else><i class="fa fa-spinner fa-spin mr-2"></i>正在同步...</span>
                        </button>
                        <button type="button" @click="goBack" class="w-full py-4 text-gray-400 font-bold text-sm mt-2">
                            取消修改
                        </button>
                    </div>
                </form>
            </div>
        </main>

        <div v-if="toast.show"
            class="fixed top-20 left-1/2 -translate-x-1/2 z-[100] px-4 py-3 rounded-2xl text-sm font-bold text-white shadow-xl transition-all duration-300"
            :class="toast.type === 'error' ? 'bg-red-500' : 'bg-green-500'">
            <i class="fa mr-2" :class="toast.type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'"></i>
            {{ toast.message }}
        </div>
    </div>

    <script>
        const { createApp, ref, reactive, onMounted } = Vue;

        createApp({
            setup() {
                const isLoading = ref(true);
                const loadError = ref('');
                const isSaving = ref(false);
                const potId = ref(null);
                const imageFile = ref(null);
                const imagePreview = ref(null);
                const originalImageUrl = ref(null);
                const suggestions = ref([]);
                const toast = ref({ show: false, message: '', type: 'success' });
                let toastTimer = null;

                const form = reactive({
                    name: '',
                    plant_date: '',
                    note: ''
                });

                const init = async () => {
                    isLoading.value = true;
                    loadError.value = '';
                    const params = new URLSearchParams(window.location.search);
                    potId.value = params.get('id');

                    if (!potId.value) {
                        loadError.value = '未找到花盆 ID，请返回列表后重试。';
                        isLoading.value = false;
                        return;
                    }

                    try {
                        const res = await apiClient.getPotDetail(potId.value);
                        if (res.success) {
                            const p = res.data;
                            form.name = p.name;
                            form.plant_date = p.plant_date;
                            form.note = p.note || '';
                            imagePreview.value = p.image_url;
                            originalImageUrl.value = p.image_url;
                        } else {
                            loadError.value = '数据返回异常，请稍后重试。';
                        }
                    } catch (e) {
                        loadError.value = e.message || '网络异常，请稍后重试。';
                    } finally {
                        isLoading.value = false;
                    }
                };

                const retryInit = () => {
                    init();
                };

                const onFileSelected = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        imageFile.value = file;
                        const reader = new FileReader();
                        reader.onload = (ev) => imagePreview.value = ev.target.result;
                        reader.readAsDataURL(file);
                    }
                };

                const onNameInput = async () => {
                    if (form.name.length < 2) {
                        suggestions.value = [];
                        return;
                    }
                    try {
                        const res = await apiClient.searchPlants(form.name);
                        if (res.success) {
                            suggestions.value = res.data.slice(0, 5).map(p => p.name);
                        }
                    } catch (e) { }
                };

                const selectSuggestion = (name) => {
                    form.name = name;
                    suggestions.value = [];
                };

                const showToast = (message, type = 'success') => {
                    toast.value = { show: true, message, type };
                    if (toastTimer) clearTimeout(toastTimer);
                    toastTimer = setTimeout(() => {
                        toast.value.show = false;
                    }, 2200);
                };

                const updatePot = async () => {
                    try {
                        isSaving.value = true;
                        let imageUrl = originalImageUrl.value;
                        if (imageFile.value) {
                            const uploadRes = await apiClient.uploadImage(imageFile.value, {
                                potId: potId.value,
                                uploadType: 'pot'
                            });
                            if (uploadRes.success) {
                                imageUrl = uploadRes.data.url;
                            }
                        }

                        const payload = {
                            name: form.name,
                            plantDate: form.plant_date,
                            note: form.note,
                            imageUrl: imageUrl
                        };

                        const res = await apiClient.updatePot(potId.value, payload);
                        if (res.success) {
                            showToast('修改成功！');
                            setTimeout(() => {
                                window.location.href = `pot-detail.html?id=${potId.value}`;
                            }, 500);
                        }
                    } catch (err) {
                        showToast('修改失败: ' + err.message, 'error');
                    } finally {
                        isSaving.value = false;
                    }
                };

                const goBack = () => {
                    if (potId.value) {
                        window.location.href = `pot-detail.html?id=${potId.value}`;
                        return;
                    }
                    window.location.href = 'index.html';
                };

                onMounted(init);

                return {
                    isLoading, loadError, form, isSaving, imagePreview, suggestions, toast,
                    onFileSelected, onNameInput, selectSuggestion, updatePot, retryInit, goBack
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
